version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blobuser
      POSTGRES_PASSWORD: blobpass
      POSTGRES_DB: blob_sync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blobuser -d blob_sync"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
